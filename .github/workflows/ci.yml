name: CI

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Linting + formatting ────────────────────────────────────────────────────
  lint:
    name: Lint & Format (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-ruff@v1
      - run: ruff check sabench tests
      - run: ruff format --check sabench tests

  # ── Type checking ───────────────────────────────────────────────────────────
  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install ".[dev]"
      - run: mypy sabench --ignore-missing-imports --no-strict-optional

  # ── Tests (matrix) ─────────────────────────────────────────────────────────
  test:
    name: Tests — Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: pip install ".[dev]"
      - name: Run tests with coverage
        run: |
          python -m pytest tests sabench/tests \
            --tb=short -q \
            --cov=sabench --cov-report=xml --cov-report=term-missing
      - name: Upload coverage to Codecov
        # Only upload once to avoid duplicate reports
        if: matrix.python-version == '3.11' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: unittests
          # token: ${{ secrets.CODECOV_TOKEN }}  # uncomment for private repos

  # ── Build distribution ──────────────────────────────────────────────────────
  build:
    name: Build & check distribution
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install build twine
      - run: python -m build
      - run: twine check --strict dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── Publish to PyPI on version tags ────────────────────────────────────────
  # Requires: Settings → Environments → "pypi" → configure OIDC trusted publishing
  # at https://pypi.org/manage/account/publishing/
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/project/sabench/
    permissions:
      id-token: write   # Required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with: { name: dist, path: dist/ }
      - uses: pypa/gh-action-pypi-publish@release/v1
